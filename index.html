<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calorie Counter</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex justify-center items-center p-4">

    <div class="bg-white shadow-lg rounded-lg p-6 w-full max-w-lg">

        <!-- Title -->
        <h1 class="text-3xl font-bold text-center mb-6">
            Calorie Counter
        </h1>

        <!-- Add Food Form -->
        <form id="foodForm" class="space-y-4">

            <input
                type="text"
                id="foodName"
                placeholder="Enter Food Name"
                class="w-full border p-2 rounded"
                required
            >

            <input
                type="number"
                id="foodCalories"
                placeholder="Enter Calories"
                class="w-full border p-2 rounded"
                required
            >

            <button
                type="submit"
                class="w-full bg-blue-500 text-white p-2 rounded hover:bg-blue-600"
            >
                Add Food
            </button>

        </form>

        <!-- View Orders Button -->
        <button
            id="viewOrdersBtn"
            class="mt-4 w-full bg-green-500 text-white p-2 rounded hover:bg-green-600"
        >
            View Orders
        </button>

        <!-- Orders Section -->
        <div
            id="ordersSection"
            class="hidden mt-6 border-t pt-4"
        >

            <h2 class="text-2xl font-semibold text-center mb-4">
                Food Orders
            </h2>

            <!-- Statistics -->
            <div class="bg-gray-100 p-4 rounded mb-4">

                <p class="font-semibold">
                    Total Foods:
                    <span id="foodCount">0</span>
                </p>

                <p class="font-semibold">
                    Total Calories:
                    <span id="totalCalories">0</span>
                </p>

            </div>

            <!-- Food List -->
            <ul id="foodList" class="space-y-2"></ul>

            <!-- Reset Button -->
            <button
                id="resetBtn"
                class="mt-4 w-full bg-red-500 text-white p-2 rounded hover:bg-red-600"
            >
                Reset All
            </button>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
